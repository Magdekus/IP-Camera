name: Android Build Final Fix

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Самая стабильная версия для большинства проектов
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for all gradlew files
        run: find . -name "gradlew" -exec chmod +x {} +
      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true
      - name: Build with Gradle
        # Укажи полный путь до файла
        run: ./Android/gradlew assembleDebug
      - name: Build with Gradle1
        # Добавил --info, чтобы увидеть РЕАЛЬНУЮ причину падения
        run: ./VideoServer/gradlew assembleDebug

      - name: Upload APK
        if: success() # Загружаем, только если билд прошел
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
